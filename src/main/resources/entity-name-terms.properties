#
# Entity Name Variation Terms
#
# Terms used by GlobalTravelRuleEntityNameVariationProcessor to strip common
# legal entity suffixes from name strings before matching.
#
# Format: term.<N>=<term in post-default-processor form>
#   - Loaded via java.util.Properties (\\uXXXX escapes resolved automatically)
#   - Terms are sorted by length descending at load time to ensure
#     multi-word phrases match before their individual words
#
# After the default GlobalTravelRuleNameProcessor runs, input is already:
#   lowercase, diacritics stripped, dots/commas/hyphens replaced with space,
#   parentheses removed, split on whitespace then re-joined.
#
# Example: "Pte. Ltd." becomes ["pte", "ltd"] -> joined as "pte ltd"
#
## Common Entity Name Variations
#
#| S/N | Standard Terms                             | Variations                                     |
#|-----|--------------------------------------------|------------------------------------------------|
#| 1   | Private                                    | Pte, Pvt, Pvt.                                 |
#| 2   | Limited                                    | Ltd, Ltd.,                                     |
#| 3   | Private Limited                            | Pte Ltd, Pte. Ltd., Pvt Ltd, Pvt. Ltd.         |
#| 4   | Limited Liability Company                  | LLC, L.L.C.                                    |
#| 5   | Incorporated                               | Inc, Inc.                                      |
#| 6   | Limited Partnership                        | LP, L.P., Ltd Partnership                      |
#| 7   | Proprietary Limited                        | Pty Ltd, Pty. Ltd.                             |
#| 8   | Company                                    | Co, Co.                                        |
#| 9   | Public Limited Company                     | PLC, P.L.C.                                    |
#| 10  | Limited Liability Partnership              | LLP, L.L.P.                                  	 |
#| 11  | Spó?ka z ograniczon? odpowiedzialno?ci?    | SP. Z O.O., Spolka z o.o., sp z o o, sp. z o.o.|
#| 12  | Sociedad Limitada                          | SL, S.L.                                       |
# Row 11: Polish - standard term (without l-stroke for non-Polish input)
term.1=spolka z ograniczona odpowiedzialnoscia
# Row 10: Limited Liability Partnership
term.2=limited liability partnership
# Row 4: Limited Liability Company
term.3=limited liability company
# Row 9: Public Limited Company
term.4=public limited company
# Row 7: Proprietary Limited
term.5=proprietary limited
# Row 6: Limited Partnership
term.6=limited partnership
# Row 12: Sociedad Limitada
term.7=sociedad limitada
# Row 3: Private Limited
term.8=private limited
# Row 6: Ltd Partnership (variation)
term.9=ltd partnership
# Row 5: Incorporated
term.10=incorporated
# Row 11: Spolka z o.o. (variation, after processing)
term.11=spolka z o.o.
# Row 11: SP. Z O.O. / sp z o o / sp. z o.o. (variations, after processing)
term.12=sp z o o
term.13=sp. z o.o.
term.14=sp. z o.o.
# Row 3: Pvt Ltd / Pvt. Ltd. (variations, after processing)
term.15=pvt ltd
term.16=pvt. ltd.
# Row 3: Pte Ltd / Pte. Ltd. (variations, after processing)
term.17=pte ltd
# Row 7: Pty Ltd / Pty. Ltd. (variations, after processing)
term.18=pty ltd
term.19=pty. ltd.
# Row 1: Private (standard term)
term.20=private
# Row 2: Limited (standard term)
term.21=limited
# Row 8: Company (standard term)
term.22=company
# Row 4: L.L.C. (variation, after processing: dots become spaces)
term.23=l l c
# Row 10: L.L.P. (variation, after processing)
term.24=l l p
term.25=l.l.p.
# Row 9: P.L.C. (variation, after processing)
term.26=p l c
# Row 4: LLC (variation)
term.27=llc
term.28=l.l.c
# Row 10: LLP (variation)
term.29=llp
# Row 9: PLC (variation)
term.30=plc
term.31=p.l.c.
# Row 5: Inc / Inc. (variations)
term.32=inc
term.33=inc.
# Row 1: Pvt / Pvt. (variations)
term.34=pvt
term.35=pvt.
# Row 1: Pte (variation)
term.36=pte
# Row 2: Ltd / Ltd. (variations)
term.37=ltd
term.38=ltd.
# Row 6: L.P. (variation, after processing)
term.39=l p
term.40=l.p.
# Row 12: S.L. (variation, after processing)
term.41=s l
# Row 12: SL (variation)
term.42=sl
# Row 6: LP (variation)
term.43=lp
# Row 8: Co / Co. (variations)
term.44=co
term.45=co.
